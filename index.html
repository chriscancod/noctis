<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOCTIS</title>

<style>

body{
font-family:Helvetica, Arial, sans-serif;
margin:0;
background:white;
color:black;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
border-bottom:1px solid #eee;
position:sticky;
top:0;
background:white;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:4px;
}

nav a{
margin-left:25px;
text-decoration:none;
color:black;
}

.cart-btn{
cursor:pointer;
font-weight:bold;
}

/* HERO */

.hero{
height:80vh;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
letter-spacing:8px;
margin:0;
}

.shop-btn{
margin-top:20px;
padding:12px 25px;
background:white;
border:none;
cursor:pointer;
}

/* PRODUCTS */

.section{
padding:60px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.card{
border:1px solid #eee;
padding:20px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
}

.price{
margin:10px 0;
font-weight:bold;
}

.buy{
background:black;
color:white;
border:none;
padding:12px 20px;
cursor:pointer;
}

/* CART */

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
border-left:1px solid #eee;
padding:25px;
transition:.4s;
overflow:auto;
}

.cart.open{
right:0;
}

.checkout{
background:black;
color:white;
border:none;
padding:14px;
width:100%;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">NOCTIS</div>

<nav>

<a href="#shirts">Shirts</a>
<a href="#pants">Pants</a>
<a href="#cases">Cases</a>
<a href="#accessories">Accessories</a>

</nav>

<div class="cart-btn" onclick="toggleCart()">
Cart (<span id="cartCount">0</span>)
</div>

</header>


<section class="hero">

<h1>NOCTIS</h1>

<p>ALL WORTH IT</p>

<button class="shop-btn" onclick="scrollShop()">Shop</button>

</section>


<section class="section" id="shirtsSection">
<h2>Shirts</h2>
<div class="grid" id="shirts"></div>
</section>


<section class="section" id="pantsSection">
<h2>Pants</h2>
<div class="grid" id="pants"></div>
</section>


<section class="section" id="casesSection">
<h2>Phone Cases</h2>
<div class="grid" id="cases"></div>
</section>


<section class="section" id="accessoriesSection">
<h2>Accessories</h2>
<div class="grid" id="accessories"></div>
</section>


<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: $<span id="total">0</span></h3>

<a href="https://buy.stripe.com/testlink">
<button class="checkout">Checkout With Stripe</button>
</a>

</div>


<script>

/* PRODUCT LIST
ADD PRODUCTS HERE */

const products = [
const products = [

{
name:"All Worth It Tee",
price:25,
image:"shirt1.jpg",
category:"shirts",
sizes:["S","M","L","XL"],
colors:["Black","Sand"]
},

{
name:"Noctis Sweatpants",
price:40,
image:"pants1.jpg",
category:"pants",
sizes:["S","M","L","XL"],
colors:["Black"]
},

{
name:"Noctis Phone Case",
price:20,
image:"case1.jpg",
category:"cases",
sizes:["Standard"],
colors:["Black"]
}

]

]


/* CREATE PRODUCT CARDS */

function loadProducts(){

products.forEach(product=>{

const card = `

<div class="card">

<img src="${product.image}">

<h3>${product.name}</h3>

<p class="price">$${product.price}</p>

<button class="buy" onclick="addToCart('${product.name}',${product.price})">
Add To Cart
</button>

</div>

`

document.getElementById(product.category).innerHTML += card

})

}

loadProducts()


/* CART */

let cart=[]
let total=0

function addToCart(name,price){

cart.push({name,price})
total+=price

document.getElementById("cartCount").innerText=cart.length
document.getElementById("total").innerText=total

renderCart()

}

function renderCart(){

let container=document.getElementById("cartItems")
container.innerHTML=""

cart.forEach(item=>{

container.innerHTML += `<div>${item.name} - $${item.price}</div>`

})

}


/* CART TOGGLE */

function toggleCart(){

document.getElementById("cart").classList.toggle("open")

}


/* SCROLL */

function scrollShop(){

document.getElementById("shirtsSection").scrollIntoView({
behavior:"smooth"
})

}

</script>

</body>
</html>
