<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOCTIS — ADMIN ENGINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital@1&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script>
        // INITIAL DATA CONFIG
        const DEFAULT_PRODUCTS = [
            { id:"overthinking-tee", name:"OVERTHINKING TEE", type:"UNISEX — 240GSM", price:68, badge:"NEW", category:"tees", image:"", squareLink:"", featured:true, soldOut:false, inventory:12, description:"Heavyweight 240gsm cotton." },
            { id:"no-signal-hoodie", name:"NO SIGNAL HOODIE", type:"PULLOVER — 420GSM", price:128, badge:"LIMITED", category:"hoodies", image:"", squareLink:"", featured:false, soldOut:false, inventory:5, description:"Premium fleece." }
        ];

        function loadProducts() {
            const s = localStorage.getItem('noctis_v2_prods');
            return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
        }
        function saveProducts(arr) {
            localStorage.setItem('noctis_v2_prods', JSON.stringify(arr));
        }
        let PRODUCTS = loadProducts();
    </script>

    <style>
        /* REUSING YOUR CSS VARIABLES & BASE STYLES */
        :root{ --r:#e8000d; --black:#080808; --ink:#111; --char:#1a1a1a; --ash:#2e2e2e; --fog:#888; --white:#f0ede8; --nav-h:56px; --tick-h:26px; }
        body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;margin:0;overflow-x:hidden;}
        
        /* THE SHOP ENGINE STYLES (MODERN MINIMALIST) */
        nav{position:fixed;top:0;width:100%;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:800;background:rgba(8,8,8,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--ash);}
        .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:5px;text-decoration:none;color:var(--white);}
        .nav-logo em{color:var(--r);font-style:normal;}
        .admin-trigger{font-family:'Space Mono',monospace;font-size:10px;color:var(--fog);border:1px solid var(--ash);padding:5px 10px;cursor:pointer;}

        /* HERO & GRID */
        .hero{min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding-top:80px;text-align:center;}
        .hero-img{width:300px;margin-bottom:20px;transition:transform 0.5s;}
        .hero-h1{font-family:'Bebas Neue',sans-serif;font-size:80px;line-height:0.9;}
        
        .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:2px;background:var(--ash);border:1px solid var(--ash);margin:40px 0;}
        .pcard{background:var(--black);padding:20px;position:relative;}
        .pcard img{width:100%;aspect-ratio:1/1;object-fit:contain;background:var(--char);margin-bottom:15px;}
        .pbadge{position:absolute;top:30px;left:30px;background:var(--r);font-family:'Space Mono',monospace;font-size:10px;padding:4px 8px;}

        /* ADMIN PANEL OVERLAY */
        #adminUI{position:fixed;inset:0;background:var(--black);z-index:9999;display:none;grid-template-columns:250px 1fr;}
        .ap-sidebar{border-right:1px solid var(--ash);padding:20px;overflow-y:auto;}
        .ap-main{padding:40px;overflow-y:auto;}
        .ap-item{padding:10px;border-bottom:1px solid var(--ash);cursor:pointer;font-size:12px;}
        .ap-item:hover{background:var(--char);}
        .ap-item.active{border-left:3px solid var(--r);background:var(--char);}
        
        input, select, textarea{width:100%;background:var(--char);border:1px solid var(--ash);color:white;padding:12px;margin:10px 0;font-family:inherit;}
        .img-edit-zone{width:100%;height:200px;border:2px dashed var(--ash);display:flex;align-items:center;justify-content:center;margin-bottom:20px;position:relative;overflow:hidden;}
        .img-edit-zone img{max-height:100%;}
        
        .save-btn{background:var(--r);color:white;font-family:'Bebas Neue',sans-serif;font-size:20px;padding:15px;width:100%;border:none;cursor:pointer;letter-spacing:2px;}
        .close-ap{position:absolute;top:20px;right:20px;cursor:pointer;z-index:10001;background:var(--char);padding:10px;}
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">NOCT<em>IS</em></a>
        <div onclick="toggleAdmin()" class="admin-trigger">SYSTEM ADMIN</div>
    </nav>

    <div id="storefront">
        <section class="hero" id="heroSec">
            </section>

        <div class="grid" id="mainGrid">
            </div>
    </div>

    <div id="adminUI">
        <div class="close-ap" onclick="toggleAdmin()">CLOSE & PREVIEW</div>
        <aside class="ap-sidebar">
            <h3 style="font-family:'Bebas Neue';letter-spacing:2px;">INVENTORY</h3>
            <div id="apList"></div>
            <button onclick="addNewProduct()" style="margin-top:20px;width:100%;padding:10px;background:none;border:1px dashed var(--fog);color:var(--fog);cursor:pointer;">+ NEW ITEM</button>
        </aside>
        <main class="ap-main" id="apEditor">
            <div style="color:var(--fog); text-align:center; margin-top:100px;">SELECT AN ITEM TO EDIT</div>
        </main>
    </div>

    <script>
        let currentEditId = null;

        function renderStore() {
            const hero = PRODUCTS.find(p => p.featured) || PRODUCTS[0];
            const others = PRODUCTS.filter(p => p.id !== hero.id);

            // Render Hero
            document.getElementById('heroSec').innerHTML = `
                <div class="hero-img"><img src="${hero.image || 'https://via.placeholder.com/400x400/111/fff?text=NO+IMAGE'}" style="width:100%"></div>
                <div class="hero-h1">${hero.name}</div>
                <p style="color:var(--fog); letter-spacing:4px; font-size:12px;">${hero.type}</p>
                <a href="${hero.squareLink || '#'}" class="save-btn" style="width:auto; padding:15px 40px; margin-top:20px; text-decoration:none; display:inline-block;">BUY NOW — $${hero.price}</a>
            `;

            // Render Grid
            document.getElementById('mainGrid').innerHTML = others.map(p => `
                <div class="pcard">
                    ${p.badge ? `<div class="pbadge">${p.badge}</div>` : ''}
                    <img src="${p.image || 'https://via.placeholder.com/300x300/111/fff?text=NO+IMAGE'}">
                    <div style="font-family:'Bebas Neue'; font-size:24px;">${p.name}</div>
                    <div style="font-family:'Space Mono'; font-size:10px; color:var(--fog);">${p.type}</div>
                    <div style="margin-top:10px; font-size:18px;">$${p.price}</div>
                </div>
            `).join('');
        }

        function toggleAdmin() {
            const ui = document.getElementById('adminUI');
            ui.style.display = (ui.style.display === 'grid') ? 'none' : 'grid';
            if(ui.style.display === 'grid') renderAdminSidebar();
        }

        function renderAdminSidebar() {
            document.getElementById('apList').innerHTML = PRODUCTS.map(p => `
                <div class="ap-item ${currentEditId === p.id ? 'active' : ''}" onclick="openEditor('${p.id}')">
                    ${p.name} <br> <span style="font-size:9px; color:var(--fog)">Stock: ${p.inventory}</span>
                </div>
            `).join('');
        }

        function openEditor(id) {
            currentEditId = id;
            const p = PRODUCTS.find(x => x.id === id);
            renderAdminSidebar();

            document.getElementById('apEditor').innerHTML = `
                <h2 style="font-family:'Bebas Neue'; letter-spacing:3px;">EDITING: ${p.name}</h2>
                
                <div class="img-edit-zone" onclick="triggerUpload()">
                    <img src="${p.image || ''}" id="prevImg">
                    ${!p.image ? '<span>Click to Upload Image</span>' : ''}
                </div>
                <input type="file" id="fileInp" style="display:none" onchange="handleFile(event)">
                <input type="text" placeholder="Or paste Image URL" value="${p.image}" oninput="updateField('image', this.value)">

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div><label>Name</label><input type="text" value="${p.name}" oninput="updateField('name', this.value)"></div>
                    <div><label>Price ($)</label><input type="number" value="${p.price}" oninput="updateField('price', this.value)"></div>
                </div>

                <label>Subtitle / Details</label>
                <input type="text" value="${p.type}" oninput="updateField('type', this.value)">

                <label>Square Payment Link (Link from your Square Dashboard)</label>
                <input type="text" value="${p.squareLink}" placeholder="https://square.link/u/..." oninput="updateField('squareLink', this.value)">

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div><label>Stock Quantity</label><input type="number" value="${p.inventory}" oninput="updateField('inventory', this.value)"></div>
                    <div><label>Badge (New/Sold Out)</label><input type="text" value="${p.badge}" oninput="updateField('badge', this.value)"></div>
                </div>

                <div style="margin:20px 0; border:1px solid var(--ash); padding:15px;">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                        <input type="checkbox" ${p.featured ? 'checked' : ''} onchange="setFeatured('${p.id}', this.checked)" style="width:auto"> 
                        SET AS FEATURED (HERO PRODUCT)
                    </label>
                </div>

                <button class="save-btn" onclick="saveAll()">PUBLISH CHANGES</button>
                <button onclick="deleteProduct('${p.id}')" style="background:none; color:var(--r); border:none; margin-top:20px; cursor:pointer;">DELETE PRODUCT</button>
            `;
        }

        function updateField(field, val) {
            const p = PRODUCTS.find(x => x.id === currentEditId);
            p[field] = val;
            if(field === 'image') document.getElementById('prevImg').src = val;
        }

        function setFeatured(id, isChecked) {
            if(isChecked) {
                PRODUCTS.forEach(p => p.featured = false);
                PRODUCTS.find(p => p.id === id).featured = true;
            }
        }

        function triggerUpload() { document.getElementById('fileInp').click(); }

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                updateField('image', event.target.result);
                document.getElementById('prevImg').src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveAll() {
            saveProducts(PRODUCTS);
            renderStore();
            alert("SUCCESS: STORE UPDATED.");
        }

        function addNewProduct() {
            const id = "prod-" + Date.now();
            PRODUCTS.push({ id, name: "NEW ITEM", type: "COLLECTION", price: 0, inventory: 10, image: "", featured: false });
            renderAdminSidebar();
            openEditor(id);
        }

        function deleteProduct(id) {
            if(confirm("Confirm deletion?")) {
                PRODUCTS = PRODUCTS.filter(p => p.id !== id);
                saveProducts(PRODUCTS);
                location.reload();
            }
        }

        // Init
        renderStore();
    </script>
</body>
</html>
