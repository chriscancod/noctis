<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCTIS — NO SIGNAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #050505; --ink: #0a0a0a; --char: #151515; --ash: #222;
            --white: #f5f5f5; --acid: #e8000d; --dim: #555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 50px; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--char);
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 6px; }
        .logo span { color: var(--acid); }
        .nav-links { font-family: 'Space Mono', monospace; font-size: 10px; display: flex; gap: 30px; color: var(--dim); }
        .nav-links span { cursor: pointer; transition: 0.3s; }
        .nav-links span:hover { color: var(--white); }

        /* HERO - MIRRORING USER UI */
        .hero {
            height: 85vh; display: flex; flex-direction: column; justify-content: center;
            padding: 0 8%; position: relative; border-bottom: 1px solid var(--char);
        }
        .hero-tag { font-family: 'Space Mono', monospace; color: var(--acid); font-size: 11px; margin-bottom: 15px; letter-spacing: 2px; }
        .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 15vw; line-height: 0.8; letter-spacing: -2px; }
        .hero-outline { -webkit-text-stroke: 1px var(--white); color: transparent; }
        
        .focus-circle {
            position: absolute; right: 10%; top: 50%; transform: translateY(-50%);
            width: 350px; height: 350px; border: 1px solid var(--char); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .focus-core { width: 180px; height: 180px; border: 2px solid var(--acid); border-radius: 50%; box-shadow: 0 0 50px rgba(232, 0, 13, 0.2); }

        /* SHOP SECTION */
        .container { max-width: 1600px; margin: 0 auto; padding: 100px 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 50px; }
        
        .pcard { background: var(--ink); border: 1px solid var(--char); transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .pcard:hover { border-color: var(--white); transform: translateY(-15px); }
        .pcard-img-box { width: 100%; aspect-ratio: 1; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--char); }
        .pcard-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.7s; }
        .pcard:hover .pcard-img { filter: grayscale(0); transform: scale(1.05); }
        
        .pcard-data { padding: 40px; }
        .p-meta { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--acid); margin-bottom: 10px; }
        .p-name { font-family: 'Bebas Neue', sans-serif; font-size: 38px; margin-bottom: 5px; }
        .p-price { font-family: 'Space Mono', monospace; color: var(--dim); margin-bottom: 25px; }
        
        .btn {
            width: 100%; padding: 20px; border: none; font-family: 'Space Mono', monospace;
            font-weight: 700; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
        }
        .btn-white { background: var(--white); color: var(--black); }
        .btn-white:hover { background: var(--acid); color: white; }

        /* ADMIN PORTAL */
        #adminPortal { position: fixed; inset: 0; background: var(--black); z-index: 2000; display: none; padding: 80px; overflow-y: auto; }
        .admin-wrap { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 100px; }
        input, select { 
            width: 100%; padding: 20px; background: var(--char); border: 1px solid var(--ash); 
            color: white; font-family: 'Space Mono', monospace; margin-bottom: 20px; outline: none;
        }
        .upload-area { border: 1px dashed var(--dim); padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .upload-area:hover { border-color: var(--acid); background: var(--char); }
        #preview { width: 120px; height: 120px; object-fit: cover; margin: 10px auto; border: 1px solid var(--acid); display: none; }
        
        .inv-row { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid var(--char); cursor: pointer; }
        .inv-row:hover { background: var(--char); }
        
        /* LOGIN MODAL */
        #authLayer { position: fixed; inset: 0; background: black; z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(50px); }
    </style>
</head>
<body>

<nav>
    <div class="logo">NOC<span>TIS</span></div>
    <div class="nav-links">
        <span onclick="toggleAuth()">[ ACCESS_SYSTEM ]</span>
    </div>
</nav>

<section class="hero">
    <p class="hero-tag">STATUS: PHASE 01 ACTIVE</p>
    <h1 class="hero-title">ZERO<br><span class="hero-outline">DISTRACTION</span></h1>
    <div class="focus-circle"><div class="focus-core"></div></div>
</section>

<div class="container">
    <div class="grid" id="shopGrid"></div>
</div>

<div id="authLayer">
    <div style="width: 350px; text-align: center;">
        <h2 class="logo" style="margin-bottom:40px">COMMAND_LOG</h2>
        <input type="text" id="opID" placeholder="OPERATOR ID">
        <input type="password" id="opKey" placeholder="KEY CODE">
        <button class="btn btn-white" onclick="validate()">AUTHORIZE</button>
    </div>
</div>

<div id="adminPortal">
    <div style="display:flex; justify-content:space-between; margin-bottom:80px">
        <h1 class="logo">SYSTEM <span>VAULT</span></h1>
        <span class="nav-links" onclick="exitAdmin()">[ DISCONNECT ]</span>
    </div>

    <div class="admin-wrap">
        <div>
            <p class="p-meta" id="actionLabel">INITIALIZE ASSET</p>
            <input type="hidden" id="editID">
            <input type="text" id="inTitle" placeholder="ASSET NAME">
            <input type="text" id="inPrice" placeholder="PRICE">
            
            <div class="upload-area" onclick="document.getElementById('fileIn').click()">
                <p class="p-meta" style="color:var(--dim)">[ SELECT FILE ]</p>
                <img id="preview">
            </div>
            <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="handleFile()">
            
            <input type="text" id="inLink" placeholder="SQUARE LINK">
            <select id="inCat">
                <option value="HARDWARE">HARDWARE</option>
                <option value="COMPUTING">COMPUTING</option>
                <option value="MERCH">MERCH</option>
            </select>
            <button class="btn btn-white" id="syncBtn" onclick="sync()">SYNC TO FRONTEND</button>
            <button class="btn" id="cancel" onclick="reset()" style="display:none; color:var(--dim); font-size:9px">ABORT EDIT</button>
        </div>
        
        <div>
            <p class="p-meta">LIVE INVENTORY</p>
            <div id="invList"></div>
        </div>
    </div>
</div>

<script>
    // Storage Engine
    let db = JSON.parse(localStorage.getItem('noctis_final')) || [];
    let activeImg = "";

    function handleFile() {
        const file = document.getElementById('fileIn').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            activeImg = reader.result;
            const p = document.getElementById('preview');
            p.src = reader.result; p.style.display = 'block';
        };
        if(file) reader.readAsDataURL(file);
    }

    function sync() {
        const id = document.getElementById('editID').value;
        const entry = {
            title: document.getElementById('inTitle').value,
            price: document.getElementById('inPrice').value,
            img: activeImg,
            link: document.getElementById('inLink').value,
            cat: document.getElementById('inCat').value
        };

        if(!entry.img || !entry.title) return alert("MISSING DATA");

        if(id) {
            const idx = db.findIndex(x => x.id == id);
            db[idx] = { ...db[idx], ...entry };
        } else {
            db.push({ id: Date.now(), ...entry });
        }
        localStorage.setItem('noctis_final', JSON.stringify(db));
        reset(); render();
    }

    function render() {
        document.getElementById('shopGrid').innerHTML = db.map(p => `
            <div class="pcard">
                <div class="pcard-img-box"><img src="${p.img}" class="pcard-img"></div>
                <div class="pcard-data">
                    <p class="p-meta">${p.cat}</p>
                    <h3 class="p-name">${p.title}</h3>
                    <p class="p-price">$${p.price}</p>
                    <a href="${p.link}" target="_blank"><button class="btn btn-white">ACQUIRE_ACCESS</button></a>
                </div>
            </div>
        `).join('');

        document.getElementById('invList').innerHTML = db.map(p => `
            <div class="inv-row" onclick="load(${p.id})">
                <div class="p-meta"><span style="color:white">${p.title}</span> | ${p.cat}</div>
                <span onclick="event.stopPropagation(); del(${p.id})" style="color:var(--acid); font-size:10px">[X]</span>
            </div>
        `).join('');
    }

    function load(id) {
        const p = db.find(x => x.id === id);
        document.getElementById('editID').value = p.id;
        document.getElementById('inTitle').value = p.title;
        document.getElementById('inPrice').value = p.price;
        document.getElementById('inLink').value = p.link;
        document.getElementById('inCat').value = p.cat;
        activeImg = p.img;
        document.getElementById('preview').src = p.img;
        document.getElementById('preview').style.display = 'block';
        document.getElementById('syncBtn').innerText = "COMMIT CHANGES";
        document.getElementById('cancel').style.display = "block";
    }

    function reset() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('editID').value = "";
        activeImg = ""; document.getElementById('preview').style.display = 'none';
        document.getElementById('syncBtn').innerText = "SYNC TO FRONTEND";
        document.getElementById('cancel').style.display = "none";
    }

    function del(id) { if(confirm("ERASE?")) { db = db.filter(x => x.id !== id); localStorage.setItem('noctis_final', JSON.stringify(db)); render(); } }
    function toggleAuth() { document.getElementById('authLayer').style.display = 'flex'; }
    function validate() {
        if(document.getElementById('opID').value === "noctis" && document.getElementById('opKey').value === "admin124") {
            document.getElementById('authLayer').style.display = 'none';
            document.getElementById('adminPortal').style.display = 'block';
            render();
        } else { alert("VOID"); }
    }
    function exitAdmin() { document.getElementById('adminPortal').style.display = 'none'; }

    render();
</script>
</body>
</html>
